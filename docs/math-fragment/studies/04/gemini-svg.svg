<svg viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="white-outline" x="-50%" y="-50%" width="200%" height="200%">
      <feMorphology in="SourceAlpha" result="dilated" operator="dilate" radius="2" />
      
      <feFlood flood-color="white" result="white-area" />
      <feComposite in="white-area" in2="dilated" operator="in" result="outline" />
      
      <feMerge>
        <feMergeNode in="outline" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <marker id="arrow" viewBox="-13 -13 26 26" refX="10" refY="0" 
            markerWidth="5" markerHeight="5" orient="auto-start-reverse" 
            stroke="context-stroke" fill="none">
      <path d="M 0 -10 L 10 0 0 10" fill="none" stroke-width="5"></path>
    </marker>
  </defs>

  <line x1="-10" y1="10" x2="25" y2="-25" 
        stroke-width="5" stroke="red" 
        marker-end="url(#arrow)" 
        filter="url(#white-outline)"></line>
</svg>
