
<h1>Basic Trigonometric Relations</h1>

<div class="content">
<hr />
<p>In a rectangular triangle, let <math><mi>c</mi></math> be the hypothenuse opposite to the right angle, and <math><mi>a</mi></math> and <math><mi>b</mi></math> be the adjacent sides. Then the following relations are defined:</p>

<math class="numbered" equ-number="1" display="block">
<mo>sin</mo><mi>&alpha;</mi><mo>=</mo><mfrac><mi>a</mi><mi>c</mi></mfrac>
</math>

<math class="numbered" equ-number="2" display="block">
<mo>cos</mo><mi>&beta;</mi><mo>=</mo><mfrac><mi>b</mi><mi>c</mi></mfrac>
</math>

<math class="numbered" equ-number="3" display="block">
<mo>tan</mo><mi>&alpha;</mi><mo>=</mo><mfrac><mi>b</mi><mi>a</mi></mfrac>
</math>

</div>
